<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilentGuard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 20px;
      appearance: none;
    }

    #toggleBtn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: background 0.2s;
      margin-bottom: 20px;
    }

    #toggleBtn.listening { background: #dc2626; }
    #toggleBtn:disabled { background: #444; cursor: not-allowed; }

    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    #statusText {
      font-size: 0.95rem;
      color: #888;
    }

    #statusText.active { color: #22c55e; }

    /* --- Detection Log --- */
    #logContainer {
      max-height: 400px;
      overflow-y: auto;
    }

    .log-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.85rem;
    }

    .log-row:last-child { border-bottom: none; }

    /* highlighted row when an alert was triggered */
    .log-row.alerted {
      background: #1a2a1a;
      margin: 0 -16px;
      padding: 9px 16px;
      border-radius: 6px;
    }

    .log-time {
      color: #555;
      font-size: 0.75rem;
      min-width: 65px;
      flex-shrink: 0;
    }

    /* small ▶ play button */
    .play-btn {
      background: #2a2a2a;
      border: none;
      border-radius: 6px;
      color: #aaa;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.65rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-btn:hover { background: #333; color: #fff; }

    .log-label {
      flex: 1;
      color: #f0f0f0;
    }

    /* "processing..." state before backend responds */
    .log-row.pending .log-label {
      color: #555;
      font-style: italic;
    }

    .log-confidence {
      color: #888;
      font-size: 0.8rem;
      min-width: 34px;
      text-align: right;
      flex-shrink: 0;
    }

    .no-logs {
      color: #555;
      font-size: 0.9rem;
    }

    /* --- Alerts section (Telegram alerts only) --- */
    #alertsContainer { max-height: 300px; overflow-y: auto; }

    .alert-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.9rem;
    }

    .alert-row:last-child { border-bottom: none; }

    .alert-time {
      color: #666;
      font-size: 0.8rem;
      min-width: 70px;
    }

    .alert-sound { flex: 1; padding: 0 12px; color: #f0f0f0; }
    .alert-confidence { color: #888; font-size: 0.8rem; }
    .no-alerts { color: #555; font-size: 0.9rem; }

    /* --- Waveform --- */
    #waveform {
      width: 100%;
      height: 60px;
      border-radius: 8px;
      display: block;
    }

    #errorMsg {
      background: #3b1010;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🔔 SilentGuard</h1>
  <p class="subtitle">Your AI hearing assistant</p>

  <div id="errorMsg"></div>

  <label for="modeSelect">Listening Mode</label>
  <select id="modeSelect">
    <option value="Sleep">Sleep — Hearing aids off, maximum coverage</option>
    <option value="Focus">Focus — Working, critical alerts only</option>
    <option value="Music">Music — Listening, urgent + door</option>
  </select>

  <button id="toggleBtn" onclick="toggleListening()">Start Listening</button>

  <div class="card">
    <div class="card-label">Status</div>
    <div id="statusText">Not listening</div>
  </div>

  <!-- Live waveform — flat line when silent, spikes when sound hits -->
  <div class="card">
    <div class="card-label">Mic Signal</div>
    <canvas id="waveform"></canvas>
  </div>

  <!-- Detection log — shows every chunk as it's captured and classified -->
  <div class="card">
    <div class="card-label">Detection Log</div>
    <div id="logContainer">
      <div class="no-logs" id="noLogsMsg">No detections yet — press Start Listening.</div>
    </div>
  </div>

  <!-- Alerts — only shows chunks that triggered a Telegram notification -->
  <div class="card">
    <div class="card-label">Alerts Sent</div>
    <div id="alertsContainer">
      <div class="no-alerts" id="noAlertsMsg">No alerts yet — all quiet.</div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://silentguard-production-6cbc.up.railway.app";

    let isListening = false;
    let micStream = null;
    let mediaRecorder = null;
    let alertCount = 0;
    let logCounter = 0;

    // Waveform state
    let audioContext = null;
    let analyser = null;
    let animationId = null;

    async function toggleListening() {
      if (isListening) {
        stopListening();
      } else {
        await startListening();
      }
    }

    async function startListening() {
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        showError("Your browser doesn't support microphone access. Try Chrome on Android.");
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (err) {
        showError("Microphone permission denied. Please allow mic access and try again.");
        return;
      }

      isListening = true;
      clearError();
      document.getElementById("toggleBtn").textContent = "Stop Listening";
      document.getElementById("toggleBtn").classList.add("listening");
      document.getElementById("statusText").textContent = "🟢 Listening continuously...";
      document.getElementById("statusText").classList.add("active");

      startWaveform(micStream);
      recordChunk();
    }

    function stopListening() {
      isListening = false;

      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
      }

      document.getElementById("toggleBtn").textContent = "Start Listening";
      document.getElementById("toggleBtn").classList.remove("listening");
      document.getElementById("statusText").textContent = "Stopped";
      document.getElementById("statusText").classList.remove("active");

      stopWaveform();
    }

    function recordChunk() {
      if (!isListening || !micStream) return;

      const chunks = [];
      mediaRecorder = new MediaRecorder(micStream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        const blobUrl = URL.createObjectURL(blob);

        // Add a log entry immediately — shows "processing..." before backend responds
        const logId = addLogEntry(blobUrl);

        // Start next chunk immediately — no gap in recording
        if (isListening) recordChunk();

        // Send to backend in background — updates the log entry when done
        sendToBackend(blob, logId);
      };

      mediaRecorder.start();
      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }, 2000);
    }

    // Adds a new row to the Detection Log immediately when a chunk is captured
    function addLogEntry(blobUrl) {
      const id = `log-${++logCounter}`;
      const time = new Date().toLocaleTimeString();

      const container = document.getElementById("logContainer");
      const placeholder = document.getElementById("noLogsMsg");
      if (placeholder) placeholder.remove();

      // Audio object for playback when ▶ is clicked
      const audioObj = new Audio(blobUrl);

      const row = document.createElement("div");
      row.className = "log-row pending";
      row.id = id;

      // Timestamp
      const timeSpan = document.createElement("span");
      timeSpan.className = "log-time";
      timeSpan.textContent = time;

      // Play button — lets you replay what the mic captured
      const playBtn = document.createElement("button");
      playBtn.className = "play-btn";
      playBtn.textContent = "▶";
      playBtn.title = "Play this clip";
      playBtn.onclick = () => {
        audioObj.currentTime = 0;
        audioObj.play();
        playBtn.textContent = "⏹";
        audioObj.onended = () => { playBtn.textContent = "▶"; };
      };

      // Sound label — starts as "processing...", updated when backend responds
      const labelSpan = document.createElement("span");
      labelSpan.className = "log-label";
      labelSpan.textContent = "processing...";

      // Confidence — filled in when backend responds
      const confSpan = document.createElement("span");
      confSpan.className = "log-confidence";

      row.appendChild(timeSpan);
      row.appendChild(playBtn);
      row.appendChild(labelSpan);
      row.appendChild(confSpan);

      // Newest entry at the top
      container.insertBefore(row, container.firstChild);

      // Keep max 30 rows — remove oldest and free its memory
      const rows = container.querySelectorAll(".log-row");
      if (rows.length > 30) {
        rows[rows.length - 1].remove();
      }

      return id;
    }

    // Updates a log row after the backend responds
    function updateLogEntry(id, result) {
      const row = document.getElementById(id);
      if (!row) return;

      row.classList.remove("pending");

      const label = result.name_detected ? "📣 Name detected!" : (result.label || "—");
      const conf = result.confidence ? `${(result.confidence * 100).toFixed(0)}%` : "";

      row.querySelector(".log-label").textContent = label;
      row.querySelector(".log-confidence").textContent = conf;

      // Highlight the row if this triggered an alert
      if (result.alert_sent) {
        row.classList.add("alerted");
      }
    }

    async function sendToBackend(blob, logId) {
      const mode = document.getElementById("modeSelect").value;

      const formData = new FormData();
      formData.append("audio", blob, "chunk.webm");
      formData.append("mode", mode);

      try {
        const response = await fetch(`${BACKEND_URL}/classify`, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          console.warn("Backend returned error:", response.status);
          markLogError(logId, "backend error");
          return;
        }

        const result = await response.json();

        // Update the log row with the actual result
        updateLogEntry(logId, result);

        // If this triggered an alert, also add it to the Alerts section
        if (result.alert_sent) {
          addAlertRow(result);
        }

        document.getElementById("statusText").textContent = "🟢 Listening continuously...";
        document.getElementById("statusText").classList.add("active");

      } catch (err) {
        console.warn("Request failed:", err.message);
        markLogError(logId, "connection error");
        document.getElementById("statusText").textContent = "⏳ Connecting to backend...";
      }
    }

    // Marks a log row as errored (backend unreachable or failed)
    function markLogError(id, msg) {
      const row = document.getElementById(id);
      if (!row) return;
      row.classList.remove("pending");
      row.querySelector(".log-label").textContent = msg;
      row.querySelector(".log-label").style.color = "#7f1d1d";
    }

    // Adds a row to the Alerts Sent section (only for sounds that triggered Telegram)
    function addAlertRow(result) {
      const time = new Date().toLocaleTimeString();
      const soundLabel = result.name_detected ? "📣 Someone called your name!" : result.label;
      const confidence = result.confidence ? `${(result.confidence * 100).toFixed(0)}%` : "";

      if (alertCount === 0) {
        const placeholder = document.getElementById("noAlertsMsg");
        if (placeholder) placeholder.remove();
      }
      alertCount++;

      const container = document.getElementById("alertsContainer");
      const row = document.createElement("div");
      row.className = "alert-row";
      row.innerHTML = `
        <span class="alert-time">${time}</span>
        <span class="alert-sound">${soundLabel}</span>
        <span class="alert-confidence">${confidence}</span>
      `;
      container.insertBefore(row, container.firstChild);

      const rows = container.querySelectorAll(".alert-row");
      if (rows.length > 20) rows[rows.length - 1].remove();
    }

    // Draws a live waveform on the canvas using the mic stream
    function startWaveform(stream) {
      const canvas = document.getElementById("waveform");
      // Match canvas pixel size to its display size
      canvas.width = canvas.offsetWidth;
      canvas.height = 60;
      const ctx = canvas.getContext("2d");

      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512; // how much detail — higher = smoother wave

      const source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      function draw() {
        animationId = requestAnimationFrame(draw);
        analyser.getByteTimeDomainData(dataArray); // raw amplitude values

        // Clear canvas
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw the wave line
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#2563eb";
        ctx.beginPath();

        const sliceWidth = canvas.width / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          // dataArray values are 0–255, where 128 = silence (midpoint)
          const v = dataArray[i] / 128.0;
          const y = (v * canvas.height) / 2;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
          x += sliceWidth;
        }

        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
      }

      draw();
    }

    // Stops drawing and clears the canvas back to flat
    function stopWaveform() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      // Draw a flat line so canvas doesn't look broken
      const canvas = document.getElementById("waveform");
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#1e1e1e";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function clearError() {
      document.getElementById("errorMsg").style.display = "none";
    }
  </script>

</body>
</html>
